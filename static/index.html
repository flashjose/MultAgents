<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HotHub · 多平台资源聚合</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif+SC:wght@600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="app">

    <!-- ============================ Header ============================ -->
    <header class="site-header">
      <div class="brand">
        <span class="brand-emblem" aria-hidden="true">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.07-2.14-.22-4.05 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.15.43-2.29 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>
          </svg>
        </span>
        <span class="brand-text">
          <span class="brand-name">HotHub</span>
          <span class="brand-sub">多平台资源聚合 · 分类查看</span>
        </span>
      </div>

      <div class="header-actions">
        <button class="btn-theme" id="btn-theme" title="切换亮/暗主题" aria-label="切换亮/暗主题">
          <!-- Sun (shown in dark mode) -->
          <svg class="ic-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <!-- Moon (shown in light mode) -->
          <svg class="ic-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <button class="btn" id="btn-refresh" title="刷新数据">
          <svg class="ic-refresh" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 3v6h6"/><path d="M21 21v-6h-6"/><path d="M20 8a8 8 0 0 0-14-2L3 9"/><path d="M4 16a8 8 0 0 0 14 2l3-3"/>
          </svg>
          <span>刷新</span>
        </button>
        <a class="btn btn-github" href="https://github.com/flashjose/HotHub" target="_blank" rel="noopener" title="查看 GitHub 仓库">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 .5C5.37.5 0 5.87 0 12.5c0 5.3 3.44 9.8 8.21 11.39.6.11.82-.26.82-.58 0-.29-.01-1.04-.02-2.05-3.34.73-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.75.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.81 1.3 3.5.99.11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.11-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 6 0c2.29-1.55 3.3-1.23 3.3-1.23.65 1.66.24 2.88.12 3.18.77.84 1.23 1.91 1.23 3.22 0 4.61-2.8 5.63-5.48 5.92.43.37.81 1.1.81 2.22 0 1.61-.01 2.9-.01 3.29 0 .32.21.7.82.58A12.01 12.01 0 0 0 24 12.5C24 5.87 18.63.5 12 .5z"/>
          </svg>
          <span>GitHub</span>
        </a>
      </div>
    </header>

    <!-- ============================ Filters ========================== -->
    <section class="filters">
      <div class="filter-row">
        <span class="filter-label">分类</span>
        <div class="chips" id="cat-chips"><!-- JS --></div>
      </div>
      <div class="filter-row">
        <span class="filter-label">平台</span>
        <div class="chips" id="platform-chips"><!-- JS --></div>
      </div>
    </section>

    <!-- ============================ Gallery ========================== -->
    <main class="gallery" id="gallery"><!-- JS --></main>

    <nav class="pager" id="pager" aria-label="分页导航"><!-- JS --></nav>

    <div class="state-block" id="loading-state">
      <div class="spinner"></div><span>加载资源…</span>
    </div>
    <div class="state-block" id="error-state" hidden>
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="error-msg">数据加载失败</span>
      <button class="btn" id="btn-retry">重试</button>
    </div>

    <!-- ============================ Footer =========================== -->
    <footer class="site-foot">
      <span>HotHub · 多平台内容聚合 API</span>
      <a href="https://github.com/flashjose/HotHub" target="_blank" rel="noopener">github.com/flashjose/MultAgents</a>
    </footer>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
