<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HotHub · Multi Platform Trending Aggregator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <script>
    // Set theme before first paint to avoid a flash of the wrong mode.
    (function () {
      try {
        var t = localStorage.getItem("hothub-theme");
        if (t !== "light" && t !== "dark") {
          t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "light");
      }
    })();
  </script>
</head>
<body>
  <div class="app">

    <!-- ====================== Top Header ====================== -->
    <header class="topbar">
      <div class="topbar-brand">
        <span class="brand-mark" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.07-2.14-.22-4.05 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.15.43-2.29 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>
          </svg>
        </span>
        <span class="brand-text">
          <span class="brand-name">HotHub</span>
          <span class="brand-sub">Multi Platform Trending Aggregator</span>
        </span>
      </div>

      <div class="topbar-search">
        <span class="search-ic" aria-hidden="true">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </span>
        <input type="text" id="search" placeholder="搜索关键词、平台、热榜…" autocomplete="off" spellcheck="false">
        <kbd class="search-kbd">⌘K</kbd>
      </div>

      <div class="topbar-actions">
        <button class="icon-btn" id="btn-theme" title="切换主题" aria-label="切换主题">
          <svg class="ic-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>
          </svg>
          <svg class="ic-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4.2"/><path d="M12 2v2.5M12 19.5V22M4.2 4.2l1.8 1.8M18 18l1.8 1.8M2 12h2.5M19.5 12H22M4.2 19.8l1.8-1.8M18 6l1.8-1.8"/>
          </svg>
        </button>
        <button class="icon-btn has-dot" id="btn-notif" title="通知" aria-label="通知">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/>
          </svg>
        </button>
        <button class="icon-btn" id="btn-msg" title="消息中心" aria-label="消息中心">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 11.5a8.4 8.4 0 0 1-9 8.4 8.4 8.4 0 0 1-3.8-.9L3 21l1.9-4.1A8.4 8.4 0 0 1 12 3a8.4 8.4 0 0 1 9 8.5z"/>
          </svg>
        </button>
        <button class="avatar" id="user-avatar" title="账户">A</button>
      </div>
    </header>

    <!-- ====================== Body: sidebar / content / rail ====================== -->
    <div class="layout">

      <!-- ---- Sidebar ---- -->
      <aside class="sidebar">
        <nav class="nav" id="nav">
          <a href="#" class="nav-item active" data-view="home">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5 12 3l9 6.5V20a1.5 1.5 0 0 1-1.5 1.5H15V14H9v7.5H4.5A1.5 1.5 0 0 1 3 20z"/></svg>
            <span>首页</span>
          </a>
          <a href="#" class="nav-item" data-view="trending">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.07-2.14-.22-4.05 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.15.43-2.29 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
            <span>全网热点</span>
          </a>
          <a href="#" class="nav-item" data-view="live">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="20" x2="6" y2="15"/><line x1="12" y1="20" x2="12" y2="9"/><line x1="18" y1="20" x2="18" y2="4"/></svg>
            <span>实时热榜</span>
          </a>
          <a href="#" class="nav-item" data-view="search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <span>搜索</span>
          </a>
          <a href="#" class="nav-item" data-view="analytics">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21.2 15.9A10 10 0 1 1 8 2.8"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>
            <span>数据分析</span>
          </a>
          <a href="#" class="nav-item" data-view="favorites">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-4.9L5 21V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            <span>收藏</span>
          </a>
          <a href="#" class="nav-item" data-view="settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-1.8-.3 1.6 1.6 0 0 0-1 1.5V21a2 2 0 0 1-4 0v-.1A1.6 1.6 0 0 0 9 19.4a1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0 .3-1.8 1.6 1.6 0 0 0-1.5-1H3a2 2 0 0 1 0-4h.1A1.6 1.6 0 0 0 4.6 9a1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3H9a1.6 1.6 0 0 0 1-1.5V3a2 2 0 0 1 4 0v.1a1.6 1.6 0 0 0 1 1.5 1.6 1.6 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8V9a1.6 1.6 0 0 0 1.5 1H21a2 2 0 0 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1z"/></svg>
            <span>设置</span>
          </a>
        </nav>

        <div class="side-status" id="side-status">
          <div class="side-status-row">
            <span class="dot dot-ok"></span><span class="ss-label">系统状态</span><span class="ss-val" id="ss-system">—</span>
          </div>
          <div class="side-status-row">
            <span class="dot dot-ok"></span><span class="ss-label">API 连接</span><span class="ss-val" id="ss-api">—</span>
          </div>
          <div class="side-status-row">
            <span class="dot dot-info"></span><span class="ss-label">缓存</span><span class="ss-val" id="ss-cache">—</span>
          </div>
          <div class="side-status-row">
            <span class="dot dot-muted"></span><span class="ss-label">更新时间</span><span class="ss-val" id="ss-updated">—</span>
          </div>
        </div>
      </aside>

      <!-- ---- Main content (Home view) ---- -->
      <main class="content" id="view-home">

        <!-- Platform quick entry -->
        <section class="block">
          <div class="block-head">
            <h2 class="block-title">平台快捷入口</h2>
            <button class="ghost-btn" id="btn-refresh" title="刷新数据">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v6h6"/><path d="M21 21v-6h-6"/><path d="M20 8a8 8 0 0 0-14-2L3 9"/><path d="M4 16a8 8 0 0 0 14 2l3-3"/></svg>
              <span>刷新</span>
            </button>
          </div>
          <div class="platform-rail" id="platform-rail"><!-- JS --></div>
        </section>

        <!-- Ranking board -->
        <section class="block">
          <div class="board card">
            <div class="board-head">
              <div class="board-title-wrap">
                <h2 class="block-title">全网热点排行榜</h2>
                <span class="board-meta" id="board-count">—</span>
              </div>
              <div class="segmented" id="rank-tabs" role="tablist">
                <button class="seg active" data-tab="composite">综合</button>
                <button class="seg" data-tab="latest">最新</button>
                <button class="seg" data-tab="hottest">最热</button>
              </div>
            </div>

            <div class="table-wrap">
              <div class="thead">
                <span class="col-rank">排名</span>
                <span class="col-title">标题</span>
                <span class="col-src">来源平台</span>
                <span class="col-heat">热度值</span>
                <span class="col-time">发布时间</span>
                <span class="col-act">操作</span>
              </div>
              <div class="tbody" id="rank-body"><!-- JS --></div>
            </div>

            <div class="board-foot" id="board-foot" hidden>
              <button class="ghost-btn" id="btn-more">显示更多</button>
            </div>
          </div>
        </section>

        <!-- System status footer (page bottom) -->
        <footer class="sysbar card" id="sysbar">
          <span class="sysbar-title">系统运行状态</span>
          <div class="sysbar-items" id="sysbar-items"><!-- JS --></div>
          <span class="sysbar-uptime" id="sysbar-uptime">—</span>
        </footer>

        <!-- Loading / error overlays -->
        <div class="state-block" id="loading-state">
          <div class="spinner"></div><span>加载热点数据…</span>
        </div>
        <div class="state-block" id="error-state" hidden>
          <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" opacity="0.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="error-msg">数据加载失败</span>
          <button class="ghost-btn" id="btn-retry">重试</button>
        </div>
      </main>

      <!-- ---- Right rail ---- -->
      <aside class="rail" id="rail">
        <!-- Trend -->
        <div class="card rail-card">
          <div class="rail-card-head">
            <h3 class="rail-title">实时采集趋势</h3>
            <span class="rail-sub">会话内实时采样</span>
          </div>
          <div class="trend">
            <div class="trend-value"><span id="trend-current">—</span><span class="trend-delta" id="trend-delta"></span></div>
            <svg class="trend-svg" id="trend-svg" viewBox="0 0 300 72" preserveAspectRatio="none" fill="none">
              <path class="trend-area" id="trend-area" d=""></path>
              <path class="trend-line" id="trend-line" d="" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
            <div class="trend-axis"><span>24 samples</span><span>now</span></div>
          </div>
        </div>

        <!-- Categories -->
        <div class="card rail-card">
          <div class="rail-card-head">
            <h3 class="rail-title">热门分类统计</h3>
          </div>
          <div class="cats" id="cats"><!-- JS --></div>
        </div>

        <!-- Data stats -->
        <div class="card rail-card">
          <div class="rail-card-head">
            <h3 class="rail-title">数据统计</h3>
          </div>
          <div class="mini-stats">
            <div class="mini-stat">
              <span class="mini-ic mi-blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><rect x="7" y="11" width="3" height="7" rx="1"/><rect x="12" y="7" width="3" height="11" rx="1"/><rect x="17" y="13" width="3" height="5" rx="1"/></svg></span>
              <span class="mini-val" id="ms-scraped">—</span>
              <span class="mini-label">今日抓取</span>
            </div>
            <div class="mini-stat">
              <span class="mini-ic mi-green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/><path d="M4 12h4l2-3 3 6 2-3h5"/></svg></span>
              <span class="mini-val" id="ms-api">—</span>
              <span class="mini-label">API 调用</span>
            </div>
            <div class="mini-stat">
              <span class="mini-ic mi-violet"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 2v10l7 3"/></svg></span>
              <span class="mini-val" id="ms-cache">—</span>
              <span class="mini-label">缓存命中</span>
            </div>
            <div class="mini-stat">
              <span class="mini-ic mi-amber"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg></span>
              <span class="mini-val" id="ms-uptime">—</span>
              <span class="mini-label">运行时间</span>
            </div>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <!-- Placeholder overlay for non-home nav views -->
  <div class="placeholder-overlay" id="placeholder" hidden>
    <div class="placeholder-card card">
      <span class="placeholder-ic" id="placeholder-ic"></span>
      <h3 id="placeholder-title">模块开发中</h3>
      <p id="placeholder-desc">该模块正在建设中，敬请期待。</p>
      <button class="primary-btn" id="placeholder-back">返回首页</button>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
