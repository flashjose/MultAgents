services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      CACHE_TTL_SECONDS: 900
      REQUEST_TIMEOUT_SECONDS: 8
      TRUST_ENV_PROXY: "false"
      PLUGIN_DIR: plugins
      COOKIE_STRATEGY: round_robin
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
